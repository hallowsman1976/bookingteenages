<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Click to Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr&display=swap" rel="stylesheet">
    <style>body { font-family: 'Mitr', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-700 text-white p-4 shadow-lg sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="font-bold">Admin Dashboard | Click to Care</span>
            <button onclick="exportCSV()" class="bg-blue-500 px-4 py-2 rounded-lg text-sm">Export CSV</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 sm:p-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats">
            </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-3">
            <input type="text" id="search" placeholder="ค้นหาชื่อ/เบอร์..." class="flex-1 p-2 border rounded-lg">
            <select id="filter-status" class="p-2 border rounded-lg">
                <option value="">ทุกสถานะ</option>
                <option value="pending text-orange-500">รอรับบริการ</option>
                <option value="completed">รับบริการแล้ว</option>
                <option value="cancelled">ยกเลิกแล้ว</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4 text-sm font-medium text-gray-600">วันที่/เวลา</th>
                        <th class="p-4 text-sm font-medium text-gray-600">ผู้รับบริการ</th>
                        <th class="p-4 text-sm font-medium text-gray-600">บริการ</th>
                        <th class="p-4 text-sm font-medium text-gray-600">สถานะ</th>
                        <th class="p-4 text-sm font-medium text-gray-600">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
