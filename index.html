<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click to Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Mitr', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center">
    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-xl text-center">
        <h1 class="text-3xl font-bold text-blue-600 mb-2">Click to Care</h1>
        <p class="text-gray-600 mb-6">ระบบจองคิวออนไลน์คลินิกวัยรุ่น<br>รพ.นิคมคำสร้อย</p>
        
        <div class="space-y-4">
            <a href="booking.html" class="block w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-medium shadow-lg transition-all transform hover:scale-105">
                🗓️ จองคิวรับบริการ
            </a>
            <a href="my-booking.html" class="block w-full py-4 bg-mint-500 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-medium shadow-lg transition-all transform hover:scale-105">
                🔍 ตรวจสอบ/ยกเลิกคิว
            </a>
        </div>
        <p class="mt-8 text-xs text-gray-400">“จองง่าย ปรึกษาไว ใส่ใจทุกความลับของวัยรุ่น”</p>
    </div>
</body>
</html>
